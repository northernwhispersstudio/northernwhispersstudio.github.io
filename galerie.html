<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie – Northern Whispers Studio</title>
  <meta name="description" content="Galerie photo du studio Northern Whispers Studio à Toulouse." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { max-width: 100%; height: auto; }

    :root {
      --navy: #0D1B3E;
      --navy-light: #152347;
      --navy-mid: #1a2d5a;
      --sky: #A8C8F0;
      --sky-dark: #7aaee0;
      --white: #FFFFFF;
      --white-dim: rgba(255,255,255,0.75);
      --white-faint: rgba(255,255,255,0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--navy);
      color: var(--white);
      overflow-x: hidden;
      word-break: break-word;
      overflow-wrap: break-word;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 64px;
      background: rgba(13,27,62,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--white-faint);
    }

    .nav-logo { text-decoration: none; display: flex; align-items: center; }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--white-dim);
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--sky); }
    .nav-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 120px 5% 60px;
      text-align: center;
    }

    .page-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sky);
      margin-bottom: 12px;
    }

    .page-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 5vw, 3.5rem);
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.05;
      margin-bottom: 16px;
    }

    .page-title span { color: var(--sky); }

    .page-sub {
      color: var(--white-dim);
      font-size: 0.95rem;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ── GALLERY ── */
    .gallery-section {
      padding: 0 5% 90px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .gallery-item {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: var(--navy-mid);
      aspect-ratio: 1/1;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.55);
    }

    .gallery-item.wide {
      grid-column: span 2;
      aspect-ratio: 2/1;
    }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .gallery-item:hover img { transform: scale(1.04); }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(8,15,34,0.96);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 6px;
      display: block;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }

    .lightbox-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
    }

    .lightbox-caption {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sky);
    }

    .lightbox-counter {
      font-size: 0.75rem;
      color: var(--white-dim);
    }

    .lightbox-close {
      position: fixed;
      top: 20px; right: 24px;
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 201;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.16); }
    .lightbox-close svg { width: 16px; height: 16px; stroke: var(--white); fill: none; stroke-width: 2; stroke-linecap: round; }

    .lightbox-nav {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px;
      background: rgba(13,27,62,0.75);
      border: 1px solid rgba(168,200,240,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      z-index: 201;
    }

    .lightbox-nav:hover { background: rgba(168,200,240,0.15); border-color: var(--sky); }
    .lightbox-nav svg { width: 20px; height: 20px; stroke: var(--white); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    /* ── FOOTER ── */
    footer {
      background: #080f22;
      padding: 28px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      border-top: 1px solid var(--white-faint);
    }

    .footer-brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sky);
    }

    .footer-copy { font-size: 0.78rem; color: rgba(255,255,255,0.35); }

    /* ── NAV BACK min-height ── */
    .nav-back { min-height: 44px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .gallery-grid { grid-template-columns: repeat(3, 1fr); }
      .gallery-item.wide { grid-column: span 2; }
      .page-header { padding: 100px 4% 48px; }
    }

    @media (max-width: 600px) {
      .page-header { padding: 88px 4% 36px; }
      .gallery-section { padding: 0 4% 60px; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .gallery-item.wide { grid-column: span 2; aspect-ratio: 2/1; }
      .lightbox-prev { left: 8px; }
      .lightbox-next { right: 8px; }
      .page-title { font-size: clamp(1.8rem, 8vw, 2.8rem); }
      nav { padding: 0 4%; }
    }

    @media (max-width: 360px) {
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-item.wide { grid-column: span 1; aspect-ratio: 4/3; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="images/Logo.jpg" alt="NWS" style="width:48px;height:48px;border-radius:50%;object-fit:cover;display:block;" />
    </a>
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Retour au site
    </a>
  </nav>

  <!-- ── HEADER ── -->
  <div class="page-header">
    <p class="page-label">Northern Whispers Studio</p>
    <h1 class="page-title">Notre <span>Galerie</span></h1>
    <p class="page-sub">17 photos du studio — équipement, sessions et ambiance.</p>
  </div>

  <!-- ── GALLERY ── -->
  <div class="gallery-section">
    <div class="gallery-grid">

      <div class="gallery-item wide" data-index="0">
        <img src="images/Plan%20de%20travail%2027.jpg" alt="Console de mixage" loading="eager" />
      </div>

      <div class="gallery-item" data-index="1">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2013.jpg" alt="Micros & matériel" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="2">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2014.jpg" alt="Ingénierie son" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="3">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2015.jpg" alt="En session" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="4">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2016.jpg" alt="Vue du studio" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="5">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2017.jpg" alt="Rack matériel" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="6">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2018.jpg" alt="Claviers & pads" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="7">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2019.jpg" alt="Mixage" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="8">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2020.jpg" alt="Production" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="9">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2021.jpg" alt="L'ingénieur son" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="10">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2022.jpg" alt="Rack audio" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="11">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2023.jpg" alt="Portrait studio" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="12">
        <img src="images/NWS%20-%20BackgroundPlan%20de%20travail%2024.jpg" alt="Matériel pro" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="13">
        <img src="images/Plan%20de%20travail%2025.jpg" alt="Cabine vocale" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="14">
        <img src="images/Plan%20de%20travail%2026.jpg" alt="Vue d'ensemble" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="15">
        <img src="images/Plan%20de%20travail%2028.jpg" alt="Session en cours" loading="lazy" />
      </div>

      <div class="gallery-item" data-index="16">
        <img src="images/Plan%20de%20travail%2029.jpg" alt="En création" loading="lazy" />
      </div>

    </div>
  </div>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Galerie studio">
    <button class="lightbox-close" id="lb-close" aria-label="Fermer"><svg viewBox="0 0 16 16"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg></button>
    <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Précédent"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Suivant"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lb-img" src="" alt="" />
      <div class="lightbox-footer">
        <span class="lightbox-caption" id="lb-caption"></span>
        <span class="lightbox-counter" id="lb-counter"></span>
      </div>
    </div>
  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="footer-brand">Northern Whispers Studio</div>
    <div class="footer-copy">© 2024 Northern Whispers Studio · Toulouse</div>
  </footer>

  <script>
    const items = Array.from(document.querySelectorAll('.gallery-item[data-index]'));
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbCap    = document.getElementById('lb-caption');
    const lbCount  = document.getElementById('lb-counter');

    const images = items.map(el => ({
      src:     el.querySelector('img').src,
      caption: el.querySelector('img').alt
    }));

    let current = 0;

    function open(i) {
      current = i; show();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function close() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function show() {
      lbImg.src = images[current].src;
      lbImg.alt = images[current].caption;
      lbCap.textContent = images[current].caption;
      lbCount.textContent = `${current + 1} / ${images.length}`;
    }

    function prev() { current = (current - 1 + images.length) % images.length; show(); }
    function next() { current = (current + 1) % images.length; show(); }

    items.forEach(el => el.addEventListener('click', () => open(+el.dataset.index)));
    document.getElementById('lb-close').addEventListener('click', close);
    document.getElementById('lb-prev').addEventListener('click', prev);
    document.getElementById('lb-next').addEventListener('click', next);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     close();
      if (e.key === 'ArrowLeft')  prev();
      if (e.key === 'ArrowRight') next();
    });

    let tx = 0;
    lightbox.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
    });
  </script>
</body>
</html>
